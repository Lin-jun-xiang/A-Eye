<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>A-Eye｜紅綠燈偵測測試</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 16px; background: #0f172a; color: #e2e8f0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .sub { font-size: 12px; color: #94a3b8; margin-bottom: 16px; }
  .panel {
    background: #1e293b; padding: 12px; border-radius: 8px;
    margin-bottom: 12px;
  }
  .row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  button, label.file-btn {
    background: #2563eb; color: white; border: 0;
    padding: 8px 14px; border-radius: 6px; cursor: pointer;
    font-size: 13px; display: inline-block;
  }
  button:disabled { background: #475569; cursor: not-allowed; }
  label.file-btn input { display: none; }
  input[type="number"] {
    background: #0f172a; color: #e2e8f0; border: 1px solid #334155;
    padding: 4px 6px; border-radius: 4px; width: 70px;
  }
  .param { font-size: 12px; color: #94a3b8; }
  #status {
    font-family: "Consolas", monospace; font-size: 12px;
    background: #000; color: #22d3ee; padding: 8px; border-radius: 4px;
    white-space: pre-wrap; min-height: 1.4em;
  }
  .result-wrap {
    position: relative; display: inline-block;
    background: #000; border: 1px solid #334155; border-radius: 6px;
    overflow: hidden; max-width: 100%;
  }
  .result-wrap img, .result-wrap canvas {
    display: block; max-width: 100%; height: auto;
  }
  .result-wrap canvas {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
  }
  table {
    width: 100%; border-collapse: collapse; font-size: 13px;
    margin-top: 8px;
  }
  th, td {
    padding: 6px 8px; text-align: left;
    border-bottom: 1px solid #334155;
  }
  th { color: #94a3b8; font-weight: normal; }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 12px; font-weight: bold;
  }
  .badge.red    { background: #dc2626; color: white; }
  .badge.green  { background: #16a34a; color: white; }
  .badge.unknown{ background: #475569; color: #e2e8f0; }
  .sample-row { margin-top: 8px; font-size: 12px; color: #94a3b8; }
  .sample-row a {
    color: #38bdf8; text-decoration: none; margin-right: 8px;
    cursor: pointer;
  }
  .sample-row a:hover { text-decoration: underline; }
  details { margin-top: 12px; }
  details summary {
    cursor: pointer; color: #94a3b8; font-size: 12px;
    padding: 4px 0;
  }
  pre {
    background: #000; padding: 8px; border-radius: 4px;
    font-size: 11px; overflow: auto; max-height: 200px;
  }
</style>
</head>
<body>

<h1>🚦 紅綠燈偵測測試</h1>
<div class="sub">
  上傳圖片，測試目前 <code>app.js</code> 使用的流程：
  YOLOv8n 偵測 <code>traffic light (classId=9)</code> → 色彩像素統計 → 紅/綠/unknown
</div>

<div class="panel">
  <div class="row">
    <label class="file-btn">
      📁 選擇圖片
      <input type="file" id="file" accept="image/*">
    </label>
    <button id="useSample">📷 使用 test.png</button>
    <button id="rerun" disabled>🔁 重新分析</button>
    <span class="param">
      YOLO conf ≥
      <input type="number" id="conf" value="0.25" step="0.05" min="0.05" max="0.95">
      　IoU
      <input type="number" id="iou" value="0.45" step="0.05" min="0.1" max="0.9">
    </span>
  </div>
  <div class="sample-row">
    快速測試：
    <a data-src="test.png">test.png</a>
  </div>
</div>

<div class="panel">
  <div id="status">等待模型載入...</div>
</div>

<div class="panel">
  <h3 style="margin:0 0 8px; font-size:14px;">結果</h3>
  <div class="result-wrap" id="wrap">
    <img id="img" alt="">
    <canvas id="overlay"></canvas>
  </div>
  <table id="tbl">
    <thead>
      <tr>
        <th>#</th><th>判定</th><th>信心</th><th>bbox (x,y,w,h)</th>
        <th>紅像素</th><th>綠像素</th><th>亮像素</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  <details>
    <summary>Debug 訊息</summary>
    <pre id="debug"></pre>
  </details>
</div>

<script src="yolo-classes.js"></script>
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.0/dist/ort.min.js"></script>
<script>
// =============================================
// 常數（同 app.js）
// =============================================
const YOLO_INPUT_SIZE = 640;
const LIGHT_CLASS = 9;

const statusEl = document.getElementById('status');
const debugEl  = document.getElementById('debug');
const fileEl   = document.getElementById('file');
const sampleBtn= document.getElementById('useSample');
const rerunBtn = document.getElementById('rerun');
const confEl   = document.getElementById('conf');
const iouEl    = document.getElementById('iou');
const imgEl    = document.getElementById('img');
const overlay  = document.getElementById('overlay');
const tblBody  = document.querySelector('#tbl tbody');
const wrap     = document.getElementById('wrap');
const octx     = overlay.getContext('2d');

let session = null;
let modelReadyPromise = null;   // 全域 promise，讓 runAnalysis 可等待
let currentImage = null;  // HTMLImageElement

function log(msg) { statusEl.textContent = msg; }
function dlog(msg) { debugEl.textContent += msg + '\n'; }
function clearDebug() { debugEl.textContent = ''; }

// =============================================
// 載入 YOLO 模型
// =============================================
async function loadModel() {
  log('載入 YOLOv8n ONNX...');
  try {
    ort.env.wasm.wasmPaths = 'https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.0/dist/';
    // WebGL 在某些環境不穩，失敗時退回 wasm
    try {
      session = await ort.InferenceSession.create('./models/yolov8n.onnx', {
        executionProviders: ['webgl', 'wasm'],
        graphOptimizationLevel: 'all',
      });
    } catch (e1) {
      console.warn('[test] WebGL 失敗，退回 wasm:', e1.message);
      session = await ort.InferenceSession.create('./models/yolov8n.onnx', {
        executionProviders: ['wasm'],
        graphOptimizationLevel: 'all',
      });
    }
    log(`✅ 模型就緒（input: ${session.inputNames[0]}, output: ${session.outputNames[0]}）\n請上傳圖片`);
  } catch (e) {
    log('❌ 模型載入失敗: ' + e.message + '\n請確認 ./models/yolov8n.onnx 存在，並用本地伺服器 (如 npx serve .) 開啟本頁');
    throw e;
  }
}

// =============================================
// YOLO 前處理（letterbox，同 app.js）
// =============================================
function yoloPreprocess(image) {
  const vw = image.naturalWidth, vh = image.naturalHeight;
  const size = YOLO_INPUT_SIZE;
  const c = document.createElement('canvas');
  c.width = size; c.height = size;
  const cx = c.getContext('2d');

  const scale = Math.min(size / vw, size / vh);
  const nw = Math.round(vw * scale);
  const nh = Math.round(vh * scale);
  const dx = Math.round((size - nw) / 2);
  const dy = Math.round((size - nh) / 2);

  cx.fillStyle = '#000';
  cx.fillRect(0, 0, size, size);
  cx.drawImage(image, 0, 0, vw, vh, dx, dy, nw, nh);

  const pixels = cx.getImageData(0, 0, size, size).data;
  const f32 = new Float32Array(3 * size * size);
  for (let i = 0; i < size * size; i++) {
    f32[i]                    = pixels[i * 4]     / 255;
    f32[size * size + i]      = pixels[i * 4 + 1] / 255;
    f32[2 * size * size + i]  = pixels[i * 4 + 2] / 255;
  }
  return { tensor: f32, scale, dx, dy };
}

function calcIoUArray(a, b) {
  const x1 = Math.max(a[0], b[0]), y1 = Math.max(a[1], b[1]);
  const x2 = Math.min(a[0] + a[2], b[0] + b[2]);
  const y2 = Math.min(a[1] + a[3], b[1] + b[3]);
  const inter = Math.max(0, x2 - x1) * Math.max(0, y2 - y1);
  return inter / (a[2] * a[3] + b[2] * b[3] - inter || 1);
}

function nms(boxes, iouThreshold) {
  boxes.sort((a, b) => b.score - a.score);
  const keep = [];
  const sup = new Set();
  for (let i = 0; i < boxes.length; i++) {
    if (sup.has(i)) continue;
    keep.push(boxes[i]);
    for (let j = i + 1; j < boxes.length; j++) {
      if (sup.has(j)) continue;
      if (boxes[i].classId !== boxes[j].classId) continue;
      if (calcIoUArray(boxes[i].bbox, boxes[j].bbox) > iouThreshold) sup.add(j);
    }
  }
  return keep;
}

async function yoloDetect(image, confThresh, iouThresh) {
  const vw = image.naturalWidth, vh = image.naturalHeight;
  const { tensor, scale, dx, dy } = yoloPreprocess(image);
  const input = new ort.Tensor('float32', tensor, [1, 3, YOLO_INPUT_SIZE, YOLO_INPUT_SIZE]);
  const feeds = {}; feeds[session.inputNames[0]] = input;
  const results = await session.run(feeds);
  const output = results[session.outputNames[0]];
  const data = output.data;
  const numClasses = 80;
  const numDet = output.dims[2];

  const boxes = [];
  for (let i = 0; i < numDet; i++) {
    const cx = data[0 * numDet + i];
    const cy = data[1 * numDet + i];
    const w  = data[2 * numDet + i];
    const h  = data[3 * numDet + i];
    let maxS = 0, maxC = 0;
    for (let c = 0; c < numClasses; c++) {
      const s = data[(4 + c) * numDet + i];
      if (s > maxS) { maxS = s; maxC = c; }
    }
    if (maxS < confThresh) continue;
    const x1 = (cx - w / 2 - dx) / scale;
    const y1 = (cy - h / 2 - dy) / scale;
    const bw = w / scale, bh = h / scale;
    const cX = Math.max(0, Math.min(x1, vw));
    const cY = Math.max(0, Math.min(y1, vh));
    const cW = Math.min(bw, vw - cX);
    const cH = Math.min(bh, vh - cY);
    if (cW > 0 && cH > 0) {
      boxes.push({
        bbox: [cX, cY, cW, cH],
        class: (typeof YOLO_CLASSES !== 'undefined') ? YOLO_CLASSES[maxC] : String(maxC),
        classId: maxC,
        score: maxS,
      });
    }
  }
  return nms(boxes, iouThresh);
}

// =============================================
// 色彩分析（同 app.js 的 analyzeTrafficLightColor，
// 並同步回傳統計數供顯示）
// =============================================
function analyzeTrafficLightColor(image, bbox) {
  const [tx, ty, tw, th] = bbox;
  const c = document.createElement('canvas');
  c.width = Math.max(1, Math.round(tw));
  c.height = Math.max(1, Math.round(th));
  const cx = c.getContext('2d');
  cx.drawImage(image, tx, ty, tw, th, 0, 0, c.width, c.height);
  const d = cx.getImageData(0, 0, c.width, c.height).data;

  let redScore = 0, greenScore = 0, bright = 0;
  for (let i = 0; i < d.length; i += 4) {
    const r = d[i], g = d[i + 1], b = d[i + 2];
    const mx = Math.max(r, g, b), mn = Math.min(r, g, b);
    if (mx / 255 > 0.45 && (mx > 0 ? (mx - mn) / mx : 0) > 0.25) {
      bright++;
      if (r > 160 && r > g * 1.5 && r > b * 1.5) redScore++;
      if (g > 100 && g > r * 1.2 && g > b * 1.1) greenScore++;
    }
  }

  let verdict = 'unknown';
  if (bright >= 5) {
    if (redScore > bright * 0.15 && redScore > greenScore * 2) verdict = 'red';
    else if (greenScore > bright * 0.15 && greenScore > redScore * 2) verdict = 'green';
  }
  return { verdict, redScore, greenScore, bright };
}

// =============================================
// 繪製
// =============================================
function drawOverlay(image, lights) {
  // overlay 與 img 同尺寸（CSS 會縮放）
  overlay.width  = image.naturalWidth;
  overlay.height = image.naturalHeight;
  octx.clearRect(0, 0, overlay.width, overlay.height);

  const colorMap = {
    red:     '#ef4444',
    green:   '#22c55e',
    unknown: '#a3a3a3',
  };

  lights.forEach((l, i) => {
    const [x, y, w, h] = l.bbox;
    const col = colorMap[l.verdict];
    octx.strokeStyle = col;
    octx.lineWidth = Math.max(2, Math.min(image.naturalWidth, image.naturalHeight) / 300);
    octx.strokeRect(x, y, w, h);

    const label = `#${i + 1} ${l.verdict} ${Math.round(l.score * 100)}%`;
    octx.font = `bold ${Math.max(14, image.naturalHeight / 40)}px sans-serif`;
    const textW = octx.measureText(label).width;
    const textH = Math.max(14, image.naturalHeight / 40) + 4;
    octx.fillStyle = col;
    octx.fillRect(x, Math.max(0, y - textH), textW + 10, textH);
    octx.fillStyle = '#000';
    octx.fillText(label, x + 5, Math.max(textH - 4, y - 4));
  });
}

function renderTable(lights) {
  if (!lights.length) {
    tblBody.innerHTML = `<tr><td colspan="7" style="color:#94a3b8">未偵測到任何 traffic light</td></tr>`;
    return;
  }
  tblBody.innerHTML = lights.map((l, i) => {
    const [x, y, w, h] = l.bbox.map(v => Math.round(v));
    return `<tr>
      <td>${i + 1}</td>
      <td><span class="badge ${l.verdict}">${l.verdict.toUpperCase()}</span></td>
      <td>${(l.score * 100).toFixed(1)}%</td>
      <td>${x}, ${y}, ${w}, ${h}</td>
      <td>${l.redScore}</td>
      <td>${l.greenScore}</td>
      <td>${l.bright}</td>
    </tr>`;
  }).join('');
}

// =============================================
// 主流程
// =============================================
async function runAnalysis() {
  if (!session) {
    if (modelReadyPromise) {
      log('⏳ 模型仍在載入，請稍候...');
      try { await modelReadyPromise; }
      catch { return; /* loadModel 已顯示錯誤 */ }
    } else {
      log('模型尚未就緒');
      return;
    }
  }
  if (!currentImage) { log('請先選擇圖片'); return; }

  rerunBtn.disabled = true;
  clearDebug();
  const confThresh = parseFloat(confEl.value) || 0.25;
  const iouThresh  = parseFloat(iouEl.value)  || 0.45;

  log(`推論中...（${currentImage.naturalWidth}×${currentImage.naturalHeight}, conf≥${confThresh}, iou=${iouThresh}）`);
  const t0 = performance.now();
  let detections;
  try {
    detections = await yoloDetect(currentImage, confThresh, iouThresh);
  } catch (e) {
    log('❌ 推論失敗: ' + e.message);
    rerunBtn.disabled = false;
    return;
  }
  const t1 = performance.now();

  const lights = detections
    .filter(d => d.classId === LIGHT_CLASS)
    .map(d => {
      const ana = analyzeTrafficLightColor(currentImage, d.bbox);
      return { ...d, ...ana };
    });

  dlog(`YOLO 推論耗時: ${(t1 - t0).toFixed(1)} ms`);
  dlog(`總偵測框: ${detections.length}`);
  dlog(`traffic light 數: ${lights.length}`);
  detections.forEach((d, i) => {
    dlog(`  [${i}] ${d.class}(${d.classId}) ${(d.score * 100).toFixed(1)}%  bbox=${d.bbox.map(v => v.toFixed(0)).join(',')}`);
  });

  drawOverlay(currentImage, lights);
  renderTable(lights);

  const summary = lights.reduce((acc, l) => {
    acc[l.verdict] = (acc[l.verdict] || 0) + 1;
    return acc;
  }, {});
  const parts = Object.entries(summary).map(([k, v]) => `${k}:${v}`).join(' ');
  log(`✅ 完成｜耗時 ${(t1 - t0).toFixed(0)} ms｜偵測 ${detections.length} 物件，含 ${lights.length} 個 traffic light${parts ? ` (${parts})` : ''}`);

  rerunBtn.disabled = false;
}

function setImageFromSrc(src) {
  log('載入圖片中...');
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = async () => {
    currentImage = img;
    imgEl.src = src;
    imgEl.onload = () => {
      // 讓 overlay 跟著 img 的顯示尺寸（CSS 會縮放）
      // canvas 內部尺寸仍保持 natural 像素，用 CSS 縮放到顯示尺寸
      overlay.width  = img.naturalWidth;
      overlay.height = img.naturalHeight;
    };
    await runAnalysis();
  };
  img.onerror = () => log('❌ 圖片載入失敗: ' + src);
  img.src = src;
}

// =============================================
// 事件綁定
// =============================================
fileEl.addEventListener('change', (e) => {
  const f = e.target.files && e.target.files[0];
  if (!f) return;
  const url = URL.createObjectURL(f);
  setImageFromSrc(url);
});

sampleBtn.addEventListener('click', () => setImageFromSrc('test.png'));

document.querySelectorAll('.sample-row a').forEach(a => {
  a.addEventListener('click', () => setImageFromSrc(a.dataset.src));
});

rerunBtn.addEventListener('click', runAnalysis);

// Enter 鍵在 conf/iou 上觸發重跑
[confEl, iouEl].forEach(el => {
  el.addEventListener('change', () => { if (currentImage) runAnalysis(); });
});

// =============================================
// 啟動
// =============================================
modelReadyPromise = loadModel();
modelReadyPromise.catch(() => {});
</script>
</body>
</html>
