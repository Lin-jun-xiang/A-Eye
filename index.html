<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>A-Eye 起步警示</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.0/dist/ort.min.js"></script>
<script src="yolo-classes.js"></script>
<!-- Eruda Mobile DevTools: 在網址加 ?debug=1 即可啟用手機版 console -->
<script>
  (function () {
    try {
      var params = new URLSearchParams(location.search);
      if (params.get('debug') === '1' || location.hash.includes('debug')) {
        var s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/eruda';
        s.onload = function () {
          if (window.eruda) {
            eruda.init();
            console.log('[A-Eye] Eruda DevTools 已啟用 (debug mode)');
          }
        };
        document.head.appendChild(s);
      }
    } catch (e) { /* ignore */ }
  })();
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0a0a0a; color: #fff;
  height: 100dvh; overflow: hidden;
  display: flex; flex-direction: column;
}

/* 相機畫面 */
#camera {
  flex: 1; width: 100%; object-fit: cover;
  background: #111;
}

/* 狀態列 */
#status-bar {
  position: absolute; top: 0; left: 0; right: 0;
  padding: 12px 16px;
  padding-top: max(12px, env(safe-area-inset-top));
  display: flex; align-items: center; gap: 10px;
  background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
  z-index: 10;
}
#status-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: #4ade80; flex-shrink: 0;
  animation: pulse 2s infinite;
}
#status-dot.inactive { background: #666; animation: none; }
#status-text { font-size: 14px; opacity: 0.9; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* 偵測結果區域 */
#detection-panel {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 16px;
  padding-bottom: max(16px, env(safe-area-inset-bottom));
  background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
  z-index: 10;
}

#alerts {
  display: flex; flex-direction: column; gap: 8px;
  margin-bottom: 12px;
}

.alert-badge {
  padding: 10px 16px;
  border-radius: 12px;
  font-size: 15px; font-weight: 600;
  display: flex; align-items: center; gap: 8px;
  animation: slideUp 0.3s ease-out;
}
.alert-badge.move {
  background: rgba(59, 130, 246, 0.25);
  border: 1px solid rgba(59, 130, 246, 0.5);
  color: #93c5fd;
}
.alert-badge.green {
  background: rgba(34, 197, 94, 0.25);
  border: 1px solid rgba(34, 197, 94, 0.5);
  color: #86efac;
}
.alert-badge.red {
  background: rgba(239, 68, 68, 0.15);
  border: 1px solid rgba(239, 68, 68, 0.3);
  color: #fca5a5;
}
.alert-badge.idle {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.5);
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 控制按鈕 */
#controls {
  display: flex; gap: 10px;
}
#toggle-btn {
  flex: 1; padding: 14px;
  border: none; border-radius: 14px;
  font-size: 16px; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
}
#toggle-btn.start {
  background: #4ade80; color: #052e16;
}
#toggle-btn.stop {
  background: rgba(239, 68, 68, 0.8); color: #fff;
}
.btn-icon {
  width: 22px; height: 22px; vertical-align: middle;
  margin-right: 4px; border-radius: 4px;
}
#pip-btn {
  width: 52px; padding: 14px;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 14px; background: rgba(255,255,255,0.08);
  color: #fff; font-size: 18px; cursor: pointer;
}

/* 偵測項目開關 */
#feature-toggles {
  display: flex; gap: 8px; margin-bottom: 10px;
  flex-wrap: wrap;
}
.feature-toggle {
  flex: 1; min-width: 140px;
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 10px;
  font-size: 13px; font-weight: 500;
  cursor: pointer; user-select: none;
  transition: all 0.2s;
}
.feature-toggle input[type="checkbox"] {
  width: 18px; height: 18px; accent-color: #4ade80;
  cursor: pointer;
}
.feature-toggle.active {
  background: rgba(74, 222, 128, 0.15);
  border-color: rgba(74, 222, 128, 0.5);
  color: #bbf7d0;
}

/* 偵測框 overlay */
#overlay {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none; z-index: 5;
}

/* 全螢幕閃爍提醒 */
#flash-overlay {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 100;
  opacity: 0; transition: opacity 0.15s;
}
#flash-overlay.active { opacity: 1; }
#flash-overlay.move-flash { background: rgba(59, 130, 246, 0.2); }
#flash-overlay.green-flash { background: rgba(34, 197, 94, 0.25); }
</style>
</head>
<body>

<video id="camera" autoplay playsinline muted></video>
<canvas id="overlay"></canvas>

<div id="status-bar">
  <div id="status-dot" class="inactive"></div>
  <span id="status-text">點擊下方按鈕開始偵測</span>
  <span id="speed-display" style="margin-left:auto; font-size:14px; font-weight:600; opacity:0.85; display:none;">-- km/h</span>
</div>

<div id="detection-panel">
  <div id="alerts">
    <div class="alert-badge idle">⏳ 等待啟動...</div>
  </div>
  <div id="feature-toggles">
    <label class="feature-toggle" id="toggle-car-label">
      <input type="checkbox" id="enable-car" checked onchange="onFeatureToggle()">
      <span>🚗 前車起步偵測</span>
    </label>
    <label class="feature-toggle" id="toggle-light-label">
      <input type="checkbox" id="enable-light" checked onchange="onFeatureToggle()">
      <span>🚦 紅綠燈偵測</span>
    </label>
  </div>
  <div id="controls">    <button id="toggle-btn" class="start" onclick="toggleDetection()"><img src="icon-192.png" class="btn-icon"> 開始偵測</button>
    <button id="pip-btn" onclick="togglePiP()" title="子母畫面" style="display:none">🖼</button>
    <button id="debug-btn" onclick="debugMode=!debugMode;this.style.opacity=debugMode?1:0.4" title="Debug" style="opacity:0.4;background:#333;border:1px solid #555;color:#fff;padding:6px 10px;border-radius:8px;font-size:13px;cursor:pointer">🔍</button>
  </div>
</div>

<div id="flash-overlay"></div>

<script src="app.js"></script>
</body>
</html>
